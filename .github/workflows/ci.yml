# Contract gates for @vela/api + @vela/shell-core, plus zig-shell skeleton.
# Full native L4 hosts are not in CI yet — see docs/testing-and-acceptance.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (test + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

  zig-shell:
    name: Zig shell (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        working-directory: hosts/zig-shell
        run: zig build

      - name: Unit tests
        working-directory: hosts/zig-shell
        run: zig build test

      - name: Self-test CLI
        working-directory: hosts/zig-shell
        run: ./zig-out/bin/vela-shell --self-test
